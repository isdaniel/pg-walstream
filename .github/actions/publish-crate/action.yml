name: Publish crate (idempotent)
description: >-
  Publish one workspace crate to crates.io, skipping cleanly if that version is
  already on the crates.io index (so re-runs of a partial release don't fail).

inputs:
  crate:
    description: Cargo package name passed to `cargo publish -p`.
    required: true
  index-path:
    description: crates.io sparse-index path for the crate, e.g. "pg/-w/pg-walstream-macros".
    required: true
  version:
    description: Version being released (from the git tag).
    required: true
  token:
    description: crates.io registry token (OIDC-exchanged).
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        CARGO_REGISTRY_TOKEN: ${{ inputs.token }}
      run: |
        if curl -sf "https://index.crates.io/${{ inputs.index-path }}" | grep -q "\"vers\":\"${{ inputs.version }}\""; then
          echo "${{ inputs.crate }} ${{ inputs.version }} already on crates.io. Skipping publish."
          exit 0
        fi
        cargo publish -p ${{ inputs.crate }} --dry-run
        cargo publish -p ${{ inputs.crate }}
