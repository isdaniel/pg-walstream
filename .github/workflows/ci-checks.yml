name: CI Checks

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  MIN_COVERAGE: 90

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        rust: [stable, beta]

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        # Default backend is rustls-tls (aws-lc-rs) — needs only cmake + a C
        # compiler (preinstalled). No libpq / OpenSSL / pkg-config on this path.
        sudo apt-get install -y cmake

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Cache target directory
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-${{ matrix.rust }}-target-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.rust }}-target-

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Clippy (workspace, derive feature)
      # Gate lints on stable only; beta may add lints that would fail -D warnings.
      if: matrix.rust == 'stable'
      run: cargo clippy --workspace --all-targets --features derive -- -D warnings

    - name: Build
      run: cargo build --workspace --verbose

    - name: Run unit tests
      run: cargo test --lib --verbose

    - name: Run unit tests (derive feature)
      run: cargo test --lib --features derive --verbose

  libpq-backend:
    name: libpq backend (pq-sys, clean env)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    # Clean, minimal environment for the opt-in libpq backend: only libpq +
    # OpenSSL + pkg-config. Deliberately NO clang/libclang (pq-sys ships
    # pre-generated bindings — no bindgen) and NO cmake (no aws-lc-rs on this
    # path). If this job builds, the libpq/pq-sys backend needs nothing more.
    - name: Install dependencies (libpq only)
      run: |
        sudo apt-get update
        sudo apt-get install -y libpq-dev libssl-dev pkg-config

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-libpq-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-libpq-

    - name: Build (libpq / pq-sys)
      run: cargo build --no-default-features --features libpq --verbose

    - name: Clippy (libpq / pq-sys)
      run: cargo clippy --no-default-features --features libpq --all-targets -- -D warnings

    - name: Unit tests (libpq / pq-sys)
      run: cargo test --lib --no-default-features --features libpq --verbose

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview

    - name: Install dependencies
      run: |
        sudo apt-get update
        # Coverage runs on the default rustls-tls backend (aws-lc-rs): cmake only.
        sudo apt-get install -y cmake

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-coverage-

    - name: Generate coverage report (lcov for Codecov)
      run: cargo llvm-cov --lib --features derive --lcov --output-path lcov.info

    - name: Generate coverage report (json for threshold check)
      run: cargo llvm-cov --lib --features derive --json --output-path coverage.json

    - name: Check coverage threshold (minimum ${{ env.MIN_COVERAGE }}%)
      run: |
        COVERAGE=$(cat coverage.json | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        totals = data['data'][0]['totals']
        lines = totals['lines']
        pct = lines['percent']
        print(f'{pct:.2f}')
        ")
        echo "Line coverage: ${COVERAGE}%"
        if python3 -c "exit(0 if float('${COVERAGE}') >= ${{ env.MIN_COVERAGE }} else 1)"; then
          echo "Coverage ${COVERAGE}% meets minimum threshold of ${{ env.MIN_COVERAGE }}%"
        else
          echo "Coverage ${COVERAGE}% is below minimum threshold of ${{ env.MIN_COVERAGE }}%"
          exit 1
        fi

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: lcov.info
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  integration:
    name: Integration Tests (PG ${{ matrix.pg_version }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        # pgoutput protocol v2 (streaming in-progress transactions) requires PG 15+
        pg_version: [15, 16, 17, 18]

    services:
      postgres:
        image: postgres:${{ matrix.pg_version }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_walstream
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpq-dev pkg-config libssl-dev cmake

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-integration-

    - name: Configure PostgreSQL for logical replication
      env:
        PGPASSWORD: postgres
      run: |
        psql -h localhost -U postgres -d test_walstream -c "ALTER SYSTEM SET wal_level = 'logical';"
        psql -h localhost -U postgres -d test_walstream -c "ALTER SYSTEM SET max_replication_slots = 16;"
        psql -h localhost -U postgres -d test_walstream -c "ALTER SYSTEM SET max_wal_senders = 16;"
        # Two-phase commit tests (pgoutput_fidelity, streaming_decode) need prepared transactions.
        psql -h localhost -U postgres -d test_walstream -c "ALTER SYSTEM SET max_prepared_transactions = 16;"
        # streaming_decode forces protocol-v2 streaming by keeping the reorder buffer tiny.
        psql -h localhost -U postgres -d test_walstream -c "ALTER SYSTEM SET logical_decoding_work_mem = '64kB';"
        # Restart PostgreSQL container to apply wal_level change (requires restart)
        docker restart ${{ job.services.postgres.id }}
        # Wait for PostgreSQL to be ready after restart
        for i in $(seq 1 30); do
          pg_isready -h localhost -p 5432 -U postgres && break
          echo "Waiting for PostgreSQL after restart... ($i/30)"
          sleep 2
        done

    - name: Verify PostgreSQL logical replication config
      env:
        PGPASSWORD: postgres
      run: |
        psql -h localhost -U postgres -d test_walstream -c "SHOW wal_level;"
        psql -h localhost -U postgres -d test_walstream -c "SHOW max_replication_slots;"
        psql -h localhost -U postgres -d test_walstream -c "SHOW max_wal_senders;"

    - name: Run integration tests
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_walstream?replication=database"
        DATABASE_URL_REGULAR: "postgresql://postgres:postgres@localhost:5432/test_walstream"
        RUST_BACKTRACE: 1
      run: |
        cargo test --test snapshot_export -- --ignored --nocapture --test-threads=1

        # Clean up any lingering replication slots between test suites
        PGPASSWORD=postgres psql -h localhost -U postgres -d test_walstream \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots WHERE slot_type = 'logical';" || true

        cargo test --test rate_limited_streaming -- --ignored --nocapture --test-threads=1

        PGPASSWORD=postgres psql -h localhost -U postgres -d test_walstream \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots WHERE slot_type = 'logical';" || true

        cargo test --test safe_transaction_consumer -- --ignored --nocapture --test-threads=1

        PGPASSWORD=postgres psql -h localhost -U postgres -d test_walstream \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots WHERE slot_type = 'logical';" || true

        cargo test --test complex_types -- --ignored --nocapture --test-threads=1

        PGPASSWORD=postgres psql -h localhost -U postgres -d test_walstream \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots WHERE slot_type = 'logical';" || true

        cargo test --test typed_deserialization --features derive -- --ignored --nocapture --test-threads=1

        PGPASSWORD=postgres psql -h localhost -U postgres -d test_walstream \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots WHERE slot_type = 'logical';" || true

        cargo test --test pgoutput_fidelity -- --ignored --nocapture --test-threads=1

        PGPASSWORD=postgres psql -h localhost -U postgres -d test_walstream \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots WHERE slot_type = 'logical';" || true

        cargo test --test streaming_decode -- --ignored --nocapture --test-threads=1

        PGPASSWORD=postgres psql -h localhost -U postgres -d test_walstream \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots WHERE slot_type = 'logical';" || true

        cargo test --test binary_columns -- --ignored --nocapture --test-threads=1

        PGPASSWORD=postgres psql -h localhost -U postgres -d test_walstream \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots WHERE slot_type = 'logical';" || true

        cargo test --test pg_result_get_bytes --no-default-features --features libpq -- --ignored --nocapture --test-threads=1

        PGPASSWORD=postgres psql -h localhost -U postgres -d test_walstream \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots WHERE slot_type = 'logical';" || true

        # Ergonomics layer (WalRouter, for_each_event) + derive layer (WalTable /
        # on_*_of) — the derive module is #[cfg(feature = "derive")].
        cargo test --test ergonomics --features derive -- --ignored --nocapture --test-threads=1

        PGPASSWORD=postgres psql -h localhost -U postgres -d test_walstream \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots WHERE slot_type = 'logical';" || true

        # Bounded replay: stream to a target LSN, stop cleanly at the commit boundary.
        cargo test --test bounded_replay -- --ignored --nocapture --test-threads=1

        PGPASSWORD=postgres psql -h localhost -U postgres -d test_walstream \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots WHERE slot_type = 'logical';" || true

        # Raw XLogData bytes API: round-trip raw pgoutput through the parser, stop at target LSN.
        cargo test --test raw_xlogdata -- --ignored --nocapture --test-threads=1

        PGPASSWORD=postgres psql -h localhost -U postgres -d test_walstream \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots WHERE slot_type = 'logical';" || true

        # FAILOVER slot creation (issue #103): parenthesized option grammar, skips gracefully on PG<17; verifies pg_replication_slots.failover on 17/18.
        cargo test --test failover_slot -- --ignored --nocapture --test-threads=1

        PGPASSWORD=postgres psql -h localhost -U postgres -d test_walstream \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots WHERE slot_type = 'logical';" || true

        # CREATE_REPLICATION_SLOT option matrix: every emitted option combination executed against the live server, version-gated (issue #103).
        cargo test --test slot_matrix -- --ignored --nocapture --test-threads=1

        PGPASSWORD=postgres psql -h localhost -U postgres -d test_walstream \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots;" || true

        # BASE_BACKUP option combination: asserts the server accepts every generated option name (PG15+), then aborts the backup without draining.
        cargo test --test base_backup_options -- --ignored --nocapture --test-threads=1

        PGPASSWORD=postgres psql -h localhost -U postgres -d test_walstream \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots WHERE slot_type = 'logical';" || true

        # Server-version preflight: end-to-end core CDC path (create slot -> stream -> decode INSERT) plus PG17+ gated slot ops (FAILOVER create + ALTER) that must pass the client-side version gate and execute; the gated portion skips gracefully on PG<17.
        cargo test --test version_preflight -- --ignored --nocapture --test-threads=1

        # quote_literal escaping: proves quote_literal stays injection-safe under standard_conforming_strings off and on (a backslash+quote payload roundtrips byte-for-byte); uses the regular connection and creates no replication slot.
        cargo test --test quote_literal_scs_off -- --ignored --nocapture --test-threads=1

  integration-ssl:
    name: SSL Integration Tests (PG ${{ matrix.pg_version }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        # pgoutput protocol v2 (streaming in-progress transactions) requires PG 15+
        pg_version: [15, 16, 17, 18]

    services:
      postgres:
        image: postgres:${{ matrix.pg_version }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_walstream
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake pkg-config libssl-dev postgresql-client

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-ssl-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-ssl-

    - name: Generate SSL certificates
      run: |
        mkdir -p /tmp/pg-ssl

        # Generate CA key and self-signed certificate
        openssl req -new -x509 -days 365 -nodes \
          -newkey rsa:2048 \
          -keyout /tmp/pg-ssl/ca.key \
          -out /tmp/pg-ssl/ca.crt \
          -subj "/CN=pg-walstream-test-ca"

        # Generate server key and CSR
        openssl req -new -nodes \
          -newkey rsa:2048 \
          -keyout /tmp/pg-ssl/server.key \
          -out /tmp/pg-ssl/server.csr \
          -subj "/CN=localhost"

        # Write SAN extension config to a file (avoids process substitution issues)
        echo "subjectAltName=DNS:localhost" > /tmp/pg-ssl/server.ext

        # Sign server cert with CA (SAN=DNS:localhost only, no IP SAN)
        # This allows verify-full to succeed with localhost but fail with 127.0.0.1
        openssl x509 -req -days 365 \
          -in /tmp/pg-ssl/server.csr \
          -CA /tmp/pg-ssl/ca.crt \
          -CAkey /tmp/pg-ssl/ca.key \
          -CAcreateserial \
          -out /tmp/pg-ssl/server.crt \
          -extfile /tmp/pg-ssl/server.ext

        # Generate a separate "wrong" CA for negative tests
        openssl req -new -x509 -days 365 -nodes \
          -newkey rsa:2048 \
          -keyout /tmp/pg-ssl/wrong-ca.key \
          -out /tmp/pg-ssl/wrong-ca.crt \
          -subj "/CN=wrong-ca"

    - name: Verify generated certificates
      run: |
        echo "=== CA Certificate ==="
        openssl x509 -in /tmp/pg-ssl/ca.crt -noout -subject -issuer
        echo "=== Server Certificate ==="
        openssl x509 -in /tmp/pg-ssl/server.crt -noout -subject -issuer
        echo "=== Server Certificate SAN ==="
        openssl x509 -in /tmp/pg-ssl/server.crt -noout -ext subjectAltName
        echo "=== Verify server cert against CA ==="
        openssl verify -CAfile /tmp/pg-ssl/ca.crt /tmp/pg-ssl/server.crt

    - name: Configure PostgreSQL with SSL and logical replication
      env:
        PGPASSWORD: postgres
      run: |
        CONTAINER_ID=${{ job.services.postgres.id }}

        # Copy certificates into the PostgreSQL container
        docker cp /tmp/pg-ssl/server.crt $CONTAINER_ID:/var/lib/postgresql/server.crt
        docker cp /tmp/pg-ssl/server.key $CONTAINER_ID:/var/lib/postgresql/server.key
        docker cp /tmp/pg-ssl/ca.crt $CONTAINER_ID:/var/lib/postgresql/ca.crt

        # Set proper ownership and permissions
        docker exec $CONTAINER_ID chown postgres:postgres \
          /var/lib/postgresql/server.crt \
          /var/lib/postgresql/server.key \
          /var/lib/postgresql/ca.crt
        docker exec $CONTAINER_ID chmod 0600 /var/lib/postgresql/server.key

        # Configure SSL
        psql -h localhost -U postgres -d test_walstream -c "ALTER SYSTEM SET ssl = 'on';"
        psql -h localhost -U postgres -d test_walstream -c "ALTER SYSTEM SET ssl_cert_file = '/var/lib/postgresql/server.crt';"
        psql -h localhost -U postgres -d test_walstream -c "ALTER SYSTEM SET ssl_key_file = '/var/lib/postgresql/server.key';"
        psql -h localhost -U postgres -d test_walstream -c "ALTER SYSTEM SET ssl_ca_file = '/var/lib/postgresql/ca.crt';"

        # Configure logical replication
        psql -h localhost -U postgres -d test_walstream -c "ALTER SYSTEM SET wal_level = 'logical';"
        psql -h localhost -U postgres -d test_walstream -c "ALTER SYSTEM SET max_replication_slots = 16;"
        psql -h localhost -U postgres -d test_walstream -c "ALTER SYSTEM SET max_wal_senders = 16;"

        # Restart PostgreSQL to apply changes
        docker restart $CONTAINER_ID

        # Wait for PostgreSQL to be ready after restart
        for i in $(seq 1 30); do
          pg_isready -h localhost -p 5432 -U postgres && break
          echo "Waiting for PostgreSQL after restart... ($i/30)"
          sleep 2
        done

    - name: Verify PostgreSQL SSL and replication config
      env:
        PGPASSWORD: postgres
      run: |
        psql -h localhost -U postgres -d test_walstream -c "SHOW ssl;"
        psql -h localhost -U postgres -d test_walstream -c "SHOW wal_level;"
        psql -h localhost -U postgres -d test_walstream -c "SHOW max_replication_slots;"
        psql -h localhost -U postgres -d test_walstream -c "SHOW max_wal_senders;"
        # Verify SSL is actually working from the client side
        PGSSLMODE=require psql -h localhost -U postgres -d test_walstream \
          -c "SELECT ssl, version FROM pg_stat_ssl WHERE pid = pg_backend_pid();"

    - name: Build SSL test binary
      run: cargo test --test ssl_connections --no-default-features --features rustls-tls --no-run

    - name: Run SSL integration tests
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_walstream?replication=database"
        DATABASE_URL_REGULAR: "postgresql://postgres:postgres@localhost:5432/test_walstream"
        SSL_CA_CERT_PATH: "/tmp/pg-ssl/ca.crt"
        SSL_WRONG_CA_CERT_PATH: "/tmp/pg-ssl/wrong-ca.crt"
        RUST_BACKTRACE: 1
      run: |
        cargo test --test ssl_connections --no-default-features --features rustls-tls -- --ignored --nocapture --test-threads=1

        # Clean up any lingering replication slots between runs
        PGPASSWORD=postgres psql -h localhost -U postgres -d test_walstream \
          -c "SELECT pg_drop_replication_slot(slot_name) FROM pg_replication_slots WHERE slot_type = 'logical';" || true
