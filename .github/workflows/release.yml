name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  checks:
    name: Checks
    uses: ./.github/workflows/ci-checks.yml
    secrets: inherit

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: checks
    permissions:
      id-token: write   # required for the OIDC token exchange
      contents: write   # required by gh release create

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Verify tag is on main branch
      id: verify_main
      run: |
        git fetch origin main
        if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
          echo "Tag commit is on main branch. Proceeding with publish."
          echo "on_main=true" >> $GITHUB_OUTPUT
        else
          echo "Tag is NOT on the main branch. Skipping publish (not an error)."
          echo "on_main=false" >> $GITHUB_OUTPUT
        fi

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpq-dev pkg-config libssl-dev

    - name: Extract version from tag
      id: get_version
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        VERSION=${TAG#v}
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "tag=${TAG}" >> $GITHUB_OUTPUT

    - name: Verify tag matches Cargo.toml version
      run: |
        # Both crates inherit [workspace.package] version, so this literal is the
        # single source of truth for the whole release.
        CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/.*= "//' | sed 's/".*//')
        TAG_VERSION="${{ steps.get_version.outputs.version }}"
        echo "workspace.package version: $CARGO_VERSION"
        echo "Git tag version: $TAG_VERSION"
        if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
          echo "Error: Version mismatch between Cargo.toml ($CARGO_VERSION) and git tag ($TAG_VERSION)"
          exit 1
        fi
        # The exact dep pin in [workspace.dependencies] is the one field NOT covered
        # by inheritance — it must be bumped alongside the version.
        PIN=$(grep 'pg-walstream-macros' Cargo.toml | grep -o 'version = "=[^"]*"' | grep -o '[0-9][^"]*')
        echo "pg-walstream-macros dep pin: =$PIN"
        if [ "$PIN" != "$TAG_VERSION" ]; then
          echo "Error: pg-walstream-macros pin (=$PIN) must equal the release tag ($TAG_VERSION)"
          exit 1
        fi

    - name: Authenticate to crates.io
      id: auth
      if: steps.verify_main.outputs.on_main == 'true'
      uses: rust-lang/crates-io-auth-action@v1

    - name: Dry run publish (pg-walstream-macros)
      if: steps.verify_main.outputs.on_main == 'true'
      run: cargo publish -p pg-walstream-macros --dry-run
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

    # The lib depends on the macro crate (=version), so the macro crate must be
    # published and indexed FIRST or the lib publish fails to resolve it.
    - name: Publish pg-walstream-macros to crates.io
      if: steps.verify_main.outputs.on_main == 'true'
      run: cargo publish -p pg-walstream-macros
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

    - name: Wait for pg-walstream-macros to appear on the crates.io index
      if: steps.verify_main.outputs.on_main == 'true'
      run: |
        VER="${{ steps.get_version.outputs.version }}"
        for i in $(seq 1 30); do
          if curl -sf "https://index.crates.io/pg/-w/pg-walstream-macros" | grep -q "\"vers\":\"$VER\""; then
            echo "pg-walstream-macros $VER is indexed."
            exit 0
          fi
          echo "Waiting for crates.io to index pg-walstream-macros $VER ($i/30)..."
          sleep 10
        done
        echo "Timed out waiting for pg-walstream-macros $VER on the crates.io index."
        exit 1

    - name: Dry run publish (pg_walstream)
      if: steps.verify_main.outputs.on_main == 'true'
      run: cargo publish -p pg_walstream --dry-run
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

    - name: Publish pg_walstream to crates.io
      if: steps.verify_main.outputs.on_main == 'true'
      run: cargo publish -p pg_walstream
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

    - name: Create GitHub Release
      if: steps.verify_main.outputs.on_main == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${GITHUB_REF_NAME}" \
          --title "Release ${GITHUB_REF_NAME}" \
          --generate-notes
